<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- SEO -->
  <title>PhysicsQuest - Learn Physics Like a Game</title>
  <meta name="description" content="Master physics through an epic gamified learning adventure. Tackle quests, defeat boss battles, unlock achievements, and conquer everything from mechanics to quantum physics.">
  <meta name="keywords" content="physics, learning, gamified, education, science, mechanics, quantum, thermodynamics, interactive">
  <meta name="author" content="PhysicsQuest">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://physicsquest.app/">
  <meta property="og:title" content="PhysicsQuest - Learn Physics Like a Game">
  <meta property="og:description" content="Master physics through an epic gamified learning adventure. Tackle quests, defeat boss battles, unlock achievements, and conquer everything from mechanics to quantum physics.">
  <meta property="og:image" content="/img/og-banner.png">
  <meta property="og:site_name" content="PhysicsQuest">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PhysicsQuest - Learn Physics Like a Game">
  <meta name="twitter:description" content="Master physics through an epic gamified learning adventure. Tackle quests, defeat boss battles, unlock achievements, and conquer everything from mechanics to quantum physics.">
  <meta name="twitter:image" content="/img/og-banner.png">

  <!-- Theme Color -->
  <meta name="theme-color" content="#0a0e1a">

  <!-- Favicon — inline SVG atom symbol -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='5' fill='%2300e5ff'/%3E%3Cellipse cx='32' cy='32' rx='28' ry='10' fill='none' stroke='%2300e5ff' stroke-width='2'/%3E%3Cellipse cx='32' cy='32' rx='28' ry='10' fill='none' stroke='%2300e5ff' stroke-width='2' transform='rotate(60 32 32)'/%3E%3Cellipse cx='32' cy='32' rx='28' ry='10' fill='none' stroke='%2300e5ff' stroke-width='2' transform='rotate(120 32 32)'/%3E%3C/svg%3E">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5CHEZ0BDtYP+ec0o3FOXO4oacRqVfw6u1EjvkAx+FnEGGgA8AGSQ" crossorigin="anonymous">

  <!-- Application CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/skill-tree.css">
  <link rel="stylesheet" href="/css/lesson.css">
  <link rel="stylesheet" href="/css/quiz.css">
  <link rel="stylesheet" href="/css/boss-battle.css">
  <link rel="stylesheet" href="/css/simulation.css">
  <link rel="stylesheet" href="/css/achievements.css">
  <link rel="stylesheet" href="/css/responsive.css">

  <!-- Inline loading screen styles (renders before external CSS loads) -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      color: #e0e6f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #111827 0%, #0a0e1a 70%);
    }

    #loading-screen .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid rgba(0, 229, 255, 0.15);
      border-top-color: #00e5ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }

    #loading-screen .title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #00e5ff, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    #loading-screen .subtitle {
      font-size: 0.95rem;
      color: #6b7fa3;
      letter-spacing: 0.08em;
      animation: pulse-text 1.6s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Loading screen (visible until JS hides it) -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <div class="title">PhysicsQuest</div>
    <div class="subtitle">Loading...</div>
  </div>

  <!-- App mount point -->
  <div id="app"></div>

  <!-- KaTeX JS -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRjXdKyJ5SRLr562" crossorigin="anonymous"></script>

  <!-- Canvas-Confetti -->
  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- Chart.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>

  <!-- Howler.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        console.log('Service Worker registration failed:', err);
      });
    }
  </script>

  <!-- Application entry point -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
